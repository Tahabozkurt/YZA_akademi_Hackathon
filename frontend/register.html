<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kayıt Ol - Stok Yönetim Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="home.html">Stok Yönetim Sistemi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Giriş Yap</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="register.html">Kayıt Ol</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Yeni Hesap Oluştur</h2>
                <form id="registerForm">
                  <div class="mb-3">
                    <label for="name" class="form-label">Ad Soyad</label>
                    <input type="text" class="form-control" id="name" required>
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label">E-posta Adresi</label>
                    <input type="email" class="form-control" id="email" required>
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label">Şifre</label>
                    <input type="password" class="form-control" id="password" required>
                  </div>
                  <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Şifre Tekrar</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                  </div>
                  <button type="submit" class="btn btn-primary w-100 mt-3">Kayıt Ol</button>
                </form>
                <div class="text-center mt-3">
                    <small>Zaten hesabınız var mı? <a href="login.html">Giriş Yapın</a></small>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Bağlantı Bilgileri
        const supabaseUrl = 'https://lanmrttuhqmneqsfockz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhbm1ydHR1aHFtbmVxc2ZvY2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTI3NjYsImV4cCI6MjA5Mzk4ODc2Nn0.qkGwvBqvFhnLFSLi6cZtibMwuljf2yBBwMDTZ2PF1AQ';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Sayfanın yenilenmesini durdur

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            // Şifre eşleşme kontrolü
            if(pass !== confirmPass) {
                alert("Şifreler eşleşmiyor!");
                return;
            }

            try {
                // Supabase Kayıt (SignUp) İşlemi
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: pass,
                    options: {
                        data: {
                            full_name: name
                        }
                    }
                });

                if (error) {
                    alert("Kayıt başarısız: " + error.message);
                } else {
                    // Kayıt başarılı, kimliği kaydet
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    if (data.user) {
                        localStorage.setItem('userId', data.user.id);
                    }

                    alert("Kayıt başarılı! Lütfen mağaza ayarlarınızı tamamlayın.");
                    // İlk kurulum (onboarding) ekranına yönlendiriliyor
                    window.location.href = 'store-settings.html'; 
                }
            } catch (err) {
                console.error("Beklenmeyen hata:", err);
            }
        });
    </script>
  </body>
</html>
