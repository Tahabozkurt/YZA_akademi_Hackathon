<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teslimat Takvimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- FullCalendar kütüphanesi -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
      #calendar {
        max-width: 900px;
        margin: 0 auto;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .fc-button-primary {
        background-color: var(--primary-color) !important;
        border-color: var(--primary-color) !important;
      }
      .fc-button-primary:hover {
        background-color: var(--primary-hover) !important;
        border-color: var(--primary-hover) !important;
      }
      .fc-event {
        cursor: pointer;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="products.html"><i class="bi bi-box-seam me-2"></i> Stok Yönetim Paneli</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="products.html">Ürünler</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="calendar.html">Takvim</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="orders.html">Siparişler</a>
            </li>
          </ul>

          <div class="d-flex ms-auto align-items-center">
            <div class="dropdown">
              <a class="nav-link dropdown-toggle text-white fw-bold" href="#" id="dropdownMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-shop me-1 text-white"></i> <span id="navStoreNameDropdown">Mağaza Adı</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownMenuLink">
                <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear me-2 text-muted"></i> Ayarlar</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="login.html" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Çıkış Yap</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Teslimat Takvimi</h2>
        <!-- Buton kaldırıldı -->
      </div>

      <div class="row">
        <div class="col-md-12">
          <div id='calendar'></div>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-md-12">
           <div class="card">
             <div class="card-body">
               <h5 class="card-title"><i class="bi bi-info-circle"></i> Bilgi</h5>
               <p class="card-text mb-0">
                 <span class="badge bg-success me-2 mt-2">Tamamlanan Teslimatlar</span> yeşil renkle,<br>
                 <span class="badge bg-warning text-dark me-2 mt-2">Planlanan Teslimatlar (Gelecek)</span> sarı renkle,<br>
                 <span class="badge bg-secondary me-2 mt-2">Geçmiş Teslimatlar (Süresi Geçmiş Planlar)</span> gri renkle gösterilmektedir.
               </p>
             </div>
           </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Basit Oturum Kontrolü
      if (localStorage.getItem('isLoggedIn') !== 'true') {
          window.location.href = "home.html";
      }

      function logout() {
          localStorage.removeItem('isLoggedIn');
      }

      // Mağaza Adını Navbara Yükle
      document.addEventListener('DOMContentLoaded', function() {
          const storeProfileStr = localStorage.getItem('storeProfile');
          if (storeProfileStr) {
              const storeProfile = JSON.parse(storeProfileStr);
              const storeNameSpan = document.getElementById('navStoreNameDropdown');
              if(storeNameSpan) storeNameSpan.textContent = storeProfile.name;
          }
      });

      const API_URL = "http://127.0.0.1:8000/api/deliveries";

      document.addEventListener('DOMContentLoaded', async function() {
        var calendarEl = document.getElementById('calendar');

        // Takvimi başlat (önce boş olarak)
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'tr',
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: ''
          },
          buttonText: {
            today: 'Bugün'
          },
          events: [], // Veriler API'den gelecek
          eventClick: function(info) {
             const id = info.event.id;
             // Detay sayfasına git
             window.location.href = `delivery-details.html?id=${id}`;
          }
        });

        calendar.render();

        // Backend'den teslimat verilerini çek
        try {
            const response = await fetch(API_URL);
            if(response.ok) {
                const deliveries = await response.json();

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // Gelen verileri FullCalendar formatına çevir
                const events = deliveries.map(del => {
                    const deliveryDate = new Date(del.date);
                    deliveryDate.setHours(0, 0, 0, 0);

                    let eventColor;

                    // Renk Mantığı:
                    // 1. Tamamlandıysa her zaman yeşil
                    if (del.status === "Tamamlandı") {
                        eventColor = "#198754"; // Bootstrap success (Yeşil)
                    }
                    // 2. Tamamlanmamış ve tarihi geçmişse Gri (İptal/Unutulmuş/Gecikmiş)
                    else if (deliveryDate < today) {
                        eventColor = "#6c757d"; // Bootstrap secondary (Gri)
                    }
                    // 3. Tamamlanmamış ve tarihi bugün veya gelecekse Sarı (Planlandı)
                    else {
                        eventColor = "#ffc107"; // Bootstrap warning (Sarı)
                    }

                    // Metin rengini sarı için koyu, diğerleri için beyaz yapalım
                    let textColor = eventColor === "#ffc107" ? "#000000" : "#ffffff";

                    let productName = del.products ? del.products.name : "Bilinmeyen Ürün";
                    let sign = del.quantity > 0 ? "+" : "";

                    return {
                        id: del.id,
                        title: `${del.status}: ${productName} (${sign}${del.quantity})`,
                        start: del.date,
                        backgroundColor: eventColor,
                        textColor: textColor
                    };
                });

                // Takvime olayları ekle
                calendar.addEventSource(events);
            }
        } catch (error) {
            console.error("Takvim verileri çekilemedi:", error);
            alert("Takvim verileri yüklenemedi. Backend bağlantısını kontrol edin.");
        }
      });
    </script>
  </body>
</html>
