<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tedarik Siparişleri Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; }
        .summary-box { border: 0; border-left: 4px solid #0d6efd; border-radius: 8px; }
        .summary-box.box-warning { border-left-color: #fd7e14; }
        .summary-box.box-success { border-left-color: #198754; }
        .summary-box.box-danger  { border-left-color: #dc3545; }
        .small-muted { font-size: .875rem; color: #6c757d; }
        .supply-header-planned   { background-color: #e0f7fa; border: 1px solid #b2ebf2; }
        .supply-badge-planned    { background-color: #00bcd4; color: white; min-width: 100px; }
        .supply-header-completed { background-color: #e8f5e9; border: 1px solid #c8e6c9; }
        .supply-badge-completed  { background-color: #4caf50; color: white; min-width: 100px; }
        .supply-header-delayed   { background-color: #fbf1e6; border: 1px solid #f4d2c2; }
        .supply-badge-delayed    { background-color: #fca130; color: white; min-width: 100px; }
        .accordion-button:focus { box-shadow: none; }
        .accordion-button:not(.collapsed) { color: inherit; box-shadow: none; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Tedarik Siparişleri</h2>
            <p class="text-muted mb-0">Tedarikçilerden beklenen ürünlerin durumlarını takip edin.</p>
        </div>
    </div>

    <!-- ÖZET KARTLARI -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm summary-box">
                <div class="card-body">
                    <div class="small-muted">Toplam</div>
                    <div class="fs-3 fw-bold" id="totalCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-info" style="border-left-color:#0dcaf0">
                <div class="card-body">
                    <div class="small-muted">Planlandı</div>
                    <div class="fs-3 fw-bold" id="plannedCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-success">
                <div class="card-body">
                    <div class="small-muted">Tamamlandı</div>
                    <div class="fs-3 fw-bold" id="completedCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-danger">
                <div class="card-body">
                    <div class="small-muted">Gecikmiş</div>
                    <div class="fs-3 fw-bold" id="delayedCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FİLTRE -->
    <div class="row mb-3">
        <div class="col-md-3">
            <select id="statusFilter" class="form-select">
                <option value="">Tüm Durumlar</option>
                <option value="Planlandı">Planlandı</option>
                <option value="Tamamlandı">Tamamlandı</option>
                <option value="Gecikmiş">Gecikmiş</option>
            </select>
        </div>
    </div>

    <!-- ACCORDION LİSTE -->
    <div class="accordion" id="supplyAccordion">
        <div class="text-center py-4" id="loadingIndicator">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Tedarik verileri çekiliyor...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_BASE = "http://127.0.0.1:8000";
    let allDeliveries = [];

    async function loadSupplyData() {
        const container = document.getElementById("supplyAccordion");
        try {
            const response = await fetch(`${API_BASE}/purchase-orders/`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            allDeliveries = await response.json();
            renderList();
        } catch (error) {
            console.error("Veri çekme hatası:", error);
            container.innerHTML = "<div class='alert alert-danger'>Veriler yüklenemedi. Backend bağlantısını kontrol edin.</div>";
        }
    }

    function renderList() {
        const container = document.getElementById("supplyAccordion");
        const selectedStatus = document.getElementById("statusFilter").value;
        const filtered = selectedStatus
            ? allDeliveries.filter(d => d.status === selectedStatus)
            : allDeliveries;

        updateSummaryCards(allDeliveries);
        container.innerHTML = "";

        if (filtered.length === 0) {
            container.innerHTML = "<div class='alert alert-secondary'>Bu kritere uygun tedarik bulunamadı.</div>";
            return;
        }

        filtered.forEach((delivery, index) => {
            let headerClass, badgeClass, badgeText;

            if (delivery.status === "Tamamlandı") {
                headerClass = "supply-header-completed";
                badgeClass  = "supply-badge-completed";
                badgeText   = "TAMAMLANDI";
            } else if (delivery.status === "Gecikmiş") {
                headerClass = "supply-header-delayed";
                badgeClass  = "supply-badge-delayed";
                badgeText   = "GECİKMİŞ";
            } else {
                headerClass = "supply-header-planned";
                badgeClass  = "supply-badge-planned";
                badgeText   = "PLANLANDI";
            }

            container.insertAdjacentHTML('beforeend', `
                <div class="accordion-item mb-3 border-0 shadow-sm">
                    <h2 class="accordion-header" id="heading${index}">
                        <button class="accordion-button collapsed ${headerClass} rounded" type="button"
                            data-bs-toggle="collapse" data-bs-target="#collapse${index}">
                            <span class="badge ${badgeClass} p-2 me-3 fs-6">${badgeText}</span>
                            <span class="fw-bold me-2 text-dark">#${delivery.id}</span>
                            <span class="text-secondary d-none d-md-inline"> — ${delivery.supplier || 'Tedarikçi Yok'}</span>
                        </button>
                    </h2>
                    <div id="collapse${index}" class="accordion-collapse collapse" data-bs-parent="#supplyAccordion">
                        <div class="accordion-body bg-white border border-top-0 rounded-bottom">
                            <div class="row">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <h6 class="text-primary"><i class="bi bi-box-seam me-1"></i> Sipariş Detayı</h6>
                                    <p class="mb-1"><strong>Tedarikçi:</strong> ${delivery.supplier || '—'}</p>
                                    <p class="mb-1"><strong>Tür:</strong> ${delivery.type}</p>
                                    <p class="mb-1"><strong>Miktar:</strong> ${delivery.quantity} Adet</p>
                                </div>
                                <div class="col-md-6">
                                    <h6 class="text-primary"><i class="bi bi-info-circle me-1"></i> Lojistik & Notlar</h6>
                                    <p class="mb-1"><strong>Tarih:</strong> ${delivery.date}</p>
                                    <p class="mb-1"><strong>Durum:</strong> ${delivery.status}</p>
                                    ${delivery.notes ? `
                                    <div class="alert alert-light border mt-2 py-2 px-3 fst-italic">
                                        <i class="bi bi-card-text text-muted me-2"></i> "${delivery.notes}"
                                    </div>` : ""}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function updateSummaryCards(data) {
        document.getElementById("totalCount").innerText     = data.length;
        document.getElementById("plannedCount").innerText   = data.filter(d => d.status === "Planlandı").length;
        document.getElementById("completedCount").innerText = data.filter(d => d.status === "Tamamlandı").length;
        document.getElementById("delayedCount").innerText   = data.filter(d => d.status === "Gecikmiş").length;
    }

    document.addEventListener("DOMContentLoaded", loadSupplyData);
    document.getElementById("statusFilter").addEventListener("change", renderList);
</script>
</body>
</html>
