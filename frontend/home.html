<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stok Yönetim Sistemi - Ana Sayfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <!-- Navbar (Giriş yapılmadan önce sadece Login/Register var) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="home.html">Stok Yönetim Sistemi</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Giriş Yap</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Kayıt Ol</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- İçerik -->
    <div class="container mt-5">
      <div class="row align-items-center vh-100" style="margin-top: -100px;">
          <div class="col-md-6 text-center text-md-start">
              <h1 class="display-4 fw-bold">Stoklarınızı Kolayca Yönetin</h1>
              <p class="lead mt-3">Mağazanızın ürünlerini ekleyin, teslimatları planlayın ve stok hareketlerini takvim üzerinden anlık olarak takip edin.</p>
              <div class="mt-4">
                  <a href="login.html" class="btn btn-primary btn-lg me-2">Giriş Yap</a>
                  <a href="register.html" class="btn btn-outline-secondary btn-lg">Kayıt Ol</a>
              </div>
          </div>
          <div class="col-md-6 d-none d-md-block text-center">
             <!-- Temsili bir görsel veya ikon (Bootstrap Icon kullanabiliriz) -->
             <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Depo Görseli" class="img-fluid rounded shadow" style="max-height: 400px; object-fit: cover;">
          </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Eğer zaten giriş yapmışsa direkt panele yönlendir
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "products.html";
        }
    </script>
  </body>
</html>
