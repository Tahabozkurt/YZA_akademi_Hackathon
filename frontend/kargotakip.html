<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kargo İşlemleri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; }
        .summary-box { border: 0; border-left: 4px solid #0d6efd; border-radius: 8px; }
        .summary-box.box-success { border-left-color: #198754; }
        .summary-box.box-warning { border-left-color: #ffc107; }
        .summary-box.box-danger  { border-left-color: #dc3545; }
        .small-muted { font-size: .875rem; color: #6c757d; }
        .cargo-header-pending   { background-color: #ebf3fb; border: 1px solid #c2def4; }
        .cargo-badge-pending    { background-color: #61affe; color: white; min-width: 90px; }
        .cargo-header-delivered { background-color: #e8f6f0; border: 1px solid #bce1d0; }
        .cargo-badge-delivered  { background-color: #49cc90; color: white; min-width: 90px; }
        .cargo-header-delayed   { background-color: #fbf1e6; border: 1px solid #f4d2c2; }
        .cargo-badge-delayed    { background-color: #fca130; color: white; min-width: 90px; }
        .accordion-button:focus { box-shadow: none; }
        .accordion-button:not(.collapsed) { color: inherit; box-shadow: none; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Kargo İşlemleri</h2>
            <p class="text-muted mb-0">Kargoya verilmiş ve teslim edilmiş siparişleri buradan takip edebilirsiniz.</p>
        </div>
    </div>

    <!-- ÖZET KARTLARI -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm summary-box">
                <div class="card-body">
                    <div class="small-muted">Toplam</div>
                    <div class="fs-3 fw-bold" id="totalCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-warning">
                <div class="card-body">
                    <div class="small-muted">Kargoya Verildi</div>
                    <div class="fs-3 fw-bold" id="activeCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-success">
                <div class="card-body">
                    <div class="small-muted">Teslim Edildi</div>
                    <div class="fs-3 fw-bold" id="deliveredCount">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm summary-box box-danger">
                <div class="card-body">
                    <div class="small-muted">Gecikmiş</div>
                    <div class="fs-3 fw-bold" id="delayedCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FİLTRE -->
    <div class="row mb-3">
        <div class="col-md-3">
            <select id="statusFilter" class="form-select">
                <option value="">Tüm Durumlar</option>
                <option value="Kargoya Verildi">Kargoya Verildi</option>
                <option value="Teslim Edildi">Teslim Edildi</option>
                <option value="Gecikmiş">Gecikmiş</option>
            </select>
        </div>
    </div>

    <!-- ACCORDION LİSTE -->
    <div class="accordion" id="cargoAccordion">
        <div class="text-center py-4" id="loadingIndicator">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Kargo verileri çekiliyor...</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_BASE = "http://127.0.0.1:8000";
    let allOrders = [];

    async function loadCargoData() {
        const container = document.getElementById("cargoAccordion");
        try {
            const response = await fetch(`${API_BASE}/orders/shipments`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            allOrders = await response.json();
            renderList();
        } catch (error) {
            console.error("Veri çekme hatası:", error);
            container.innerHTML = "<div class='alert alert-danger'>Veriler yüklenemedi. Backend bağlantısını kontrol edin.</div>";
        }
    }

    function renderList() {
        const container = document.getElementById("cargoAccordion");
        const selectedStatus = document.getElementById("statusFilter").value;
        const filtered = selectedStatus
            ? allOrders.filter(o => o.status === selectedStatus)
            : allOrders;

        updateSummaryCards(allOrders);
        container.innerHTML = "";

        if (filtered.length === 0) {
            container.innerHTML = "<div class='alert alert-secondary'>Bu kritere uygun sipariş bulunamadı.</div>";
            return;
        }

        filtered.forEach((order, index) => {
            let headerClass, badgeClass, badgeText;

            if (order.status === "Teslim Edildi") {
                headerClass = "cargo-header-delivered";
                badgeClass  = "cargo-badge-delivered";
                badgeText   = "TESLİM";
            } else if (order.status === "Gecikmiş") {
                headerClass = "cargo-header-delayed";
                badgeClass  = "cargo-badge-delayed";
                badgeText   = "GECİKME";
            } else {
                headerClass = "cargo-header-pending";
                badgeClass  = "cargo-badge-pending";
                badgeText   = "KARGODA";
            }

            const detailHTML = `
                <div class="row">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <h6 class="text-primary"><i class="bi bi-person me-1"></i> Müşteri Bilgileri</h6>
                        <p class="mb-1"><strong>Müşteri:</strong> ${order.customer_name}</p>
                        <p class="mb-1"><strong>Adres:</strong> ${order.delivery_address || '—'}</p>
                        ${order.notes ? `
                        <div class="alert alert-light border mt-2 py-2 px-3 fst-italic">
                            <i class="bi bi-chat-left-text text-muted me-2"></i> "${order.notes}"
                        </div>` : ""}
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-primary"><i class="bi bi-truck me-1"></i> Kargo Detayları</h6>
                        <p class="mb-1"><strong>Sipariş No:</strong> ${order.order_number || '—'}</p>
                        <p class="mb-1"><strong>Miktar:</strong> ${order.quantity} Adet</p>
                        <p class="mb-1"><strong>Tahmini Teslimat:</strong> ${order.estimated_delivery || '—'}</p>
                        <p class="mb-1"><strong>Kargoya Verilme:</strong> ${order.shipped_at || '—'}</p>
                        <p class="mb-1"><strong>Teslim Tarihi:</strong> ${order.delivered_at || '—'}</p>
                        ${order.tracking_link ? `
                        <a href="${order.tracking_link}" target="_blank" class="btn btn-sm btn-outline-primary mt-2">
                            <i class="bi bi-box-arrow-up-right me-1"></i>Kargo Takip
                        </a>` : ""}
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', `
                <div class="accordion-item mb-3 border-0 shadow-sm">
                    <h2 class="accordion-header" id="heading${index}">
                        <button class="accordion-button collapsed ${headerClass} rounded" type="button"
                            data-bs-toggle="collapse" data-bs-target="#collapse${index}">
                            <span class="badge ${badgeClass} p-2 me-3 fs-6">${badgeText}</span>
                            <span class="fw-bold me-2 text-dark">${order.order_number || `#${order.id}`}</span>
                            <span class="text-secondary d-none d-md-inline"> — ${order.customer_name}</span>
                        </button>
                    </h2>
                    <div id="collapse${index}" class="accordion-collapse collapse"
                        data-bs-parent="#cargoAccordion">
                        <div class="accordion-body bg-white border border-top-0 rounded-bottom">
                            ${detailHTML}
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function updateSummaryCards(data) {
        document.getElementById("totalCount").innerText     = data.length;
        document.getElementById("activeCount").innerText    = data.filter(o => o.status === "Kargoya Verildi").length;
        document.getElementById("deliveredCount").innerText = data.filter(o => o.status === "Teslim Edildi").length;
        document.getElementById("delayedCount").innerText   = data.filter(o => o.status === "Gecikmiş").length;
    }

    document.addEventListener("DOMContentLoaded", loadCargoData);
    document.getElementById("statusFilter").addEventListener("change", renderList);
</script>
</body>
</html>
